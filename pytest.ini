[pytest]
# Allure is optional: install allure-pytest and pass --alluredir=allure-results --clean-alluredir (see README).
addopts = -ra -q --html=artifacts/reports/report.html --self-contained-html
testpaths = tests
markers =
    smoke: quick critical-path checks
    regression: broader behavioral coverage
    negative: validation and expected-failure scenarios
    session: post-login session and logout (requires HUDL credentials)
    security: abuse and injection-oriented checks
    cross_browser: alternate browser (e.g. Firefox)
    mobile: mobile viewport sizing
    resilience: network and fault simulation
    auth_flow: Auth0 multi-step transitions
    a11y: accessibility-oriented checks
    navigation: direct URLs and redirects
    rate_limit: many failed logins (opt-in; may lock accounts)
